appId: "com.lumitask.app"
productName: "LumiTask"

publish:
  provider: github
  owner: LumiClaw-ai
  repo: LumiTask

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: electron/icons/app-icon.icns
  category: public.app-category.developer-tools
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: electron/icons/app-icon.ico

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  icon: electron/icons
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

directories:
  output: release
  buildResources: electron

files:
  - "electron/dist/**/*"
  - "electron/icons/**/*"

extraResources:
  - from: ".next/standalone"
    to: "standalone"
    filter:
      - "**/*"
  - from: ".next/static"
    to: "standalone/.next/static"
    filter:
      - "**/*"
  - from: "public"
    to: "standalone/public"
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "**/*.node"

npmRebuild: false
