appId: "com.lumitask.app"
productName: "LumiTask"

publish:
  provider: github
  owner: LumiClaw-ai
  repo: LumiTask

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: electron/icons/app-icon.icns
  category: public.app-category.developer-tools
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
  icon: electron/icons/app-icon.icns
  iconSize: 80

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: electron/icons/app-icon.ico

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  icon: electron/icons
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

directories:
  output: release
  buildResources: electron

files:
  - "electron/dist/**/*"
  - "electron/icons/**/*"

extraResources:
  - from: "electron/.standalone"
    to: "standalone"
    filter:
      - "**/*"
      - "**/node_modules/**"

afterPack: electron/scripts/afterPack.js

asar: true
asarUnpack:
  - "**/*.node"

npmRebuild: false
